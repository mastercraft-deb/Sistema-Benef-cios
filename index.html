<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Usuários</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>📋 Sistema de Cadastro de Usuários</h1>
        
        <!-- Formulário de Cadastro -->
        <form id="cadastroForm">
            <div class="form-group">
                <label for="id">ID:</label>
                <input type="number" id="id" placeholder="Ex: 1" required>
            </div>
            
            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
            
            <div class="form-group">
                <label for="cep">CEP (para buscar endereço):</label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
            </div>
            
            <button type="submit">💾 Salvar Usuário</button>
            <div id="mensagem"></div>
        </form>
        
        <!-- Lista de Usuários Cadastrados -->
        <div class="result">
            <h2>👥 Usuários Cadastrados</h2>
            <button onclick="carregarUsuarios()" style="margin-bottom: 15px;">🔄 Atualizar Lista</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>CPF</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaUsuarios"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = ''; // Mesma origem, não precisa especificar
        
        // ==================== FORMATAÇÃO DOS CAMPOS ====================
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value.substring(0, 14);
        });

        document.getElementById('cep').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/^(\d{5})(\d)/, '$1-$2');
            e.target.value = value.substring(0, 9);
        });

        // ==================== FUNÇÕES DE CONSULTA ====================
        async function carregarUsuarios() {
            try {
                const response = await fetch(`${API_URL}/api/usuarios`);
                const result = await response.json();
                
                const tbody = document.getElementById('tabelaUsuarios');
                tbody.innerHTML = '';
                
                if (result.usuarios && result.usuarios.length > 0) {
                    result.usuarios.forEach(usuario => {
                        const row = `
                            <tr>
                                <td>${usuario.id}</td>
                                <td>${usuario.cpf}</td>
                                <td>${usuario.nome}</td>
                                <td>
                                    <button onclick="exibirDetalles(${usuario.id})" 
                                            style="padding: 5px 10px; margin-right: 5px; font-size: 12px;">
                                        👁️ Ver Endereço
                                    </button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Nenhum usuário cadastrado</td></tr>';
                }
                
                mostraMensagem(`Total: ${result.total} usuário(s)`, 'success');
                
            } catch (error) {
                mostraMensagem('Erro ao carregar usuários: ' + error.message, 'error');
            }
        }

        async function exibirDetalles(id) {
            try {
                const response = await fetch(`${API_URL}/api/usuarios/${id}`);
                const result = await response.json();
                
                if (result.success) {
                    const u = result.usuario;
                    alert(
                        `📄 Detalhes do Usuário\n\n` +
                        `ID: ${u.id}\n` +
                        `CPF: ${u.cpf}\n` +
                        `Nome: ${u.nome}\n\n` +
                        `📍 Endereço Completo:\n` +
                        `${u.endereco.logradouro}, ${u.endereco.complemento}\n` +
                        `Bairro: ${u.endereco.bairro}\n` +
                        `Cidade: ${u.endereco.cidade} - ${u.endereco.estado}\n` +
                        `CEP: ${u.endereco.cep}\n\n` +
                        `Cadaster em: ${new Date(u.data_cadastro).toLocaleString()}`
                    );
                }
            } catch (error) {
                mostraMensagem('Erro ao buscar detalhes: ' + error.message, 'error');
            }
        }

        async function deletarUsuario(id) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) return;
            
            try {
                const response = await fetch(`${API_URL}/api/usuarios/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.success) {
                    mostraMensagem(result.mensagem, 'success');
                    carregarUsuarios();
                } else {
                    mostraMensagem(result.mensagem, 'error');
                }
            } catch (error) {
                mostraMensagem('Erro ao deletar: ' + error.message, 'error');
            }
        }

        // ==================== FUNÇÃO DE CADASTRO ====================
        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const dados = {
                id: parseInt(document.getElementById('id').value),
                cpf: document.getElementById('cpf').value,
                nome: document.getElementById('nome').value,
                cep: document.getElementById('cep').value
            };
            
            try {
                const response = await fetch(`${API_URL}/api/usuarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    mostraMensagem('✅ ' + result.mensagem, 'success');
                    this.reset();
                    setTimeout(carregarUsuarios, 500);
                } else {
                    mostraMensagem('❌ ' + result.mensagem, 'error');
                }
                
            } catch (error) {
                mostraMensagem('Erro ao cadastrar: ' + error.message, 'error');
            }
        });

        function mostraMensagem(msg, tipo) {
            const el = document.getElementById('mensagem');
            el.className = tipo;
            el.textContent = msg;
        }

        // Carrega usuários ao iniciar a página
        window.addEventListener('DOMContentLoaded', carregarUsuarios);
    </script>
</body>
</html>
